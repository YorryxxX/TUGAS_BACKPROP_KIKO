<!DOCTYPE html>
<html>
<head>
    <title>Prediksi Nilai Mahasiswa</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        h2 {
            margin-bottom: 20px;
        }

        .hasil {
            margin-top: 20px;
            font-size: 18px;
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Prediksi Nilai Mahasiswa</h2>

    <form action="/predict" method="post">
        <input type="number" name="studytime" placeholder="Study Time" required>
        <input type="number" name="failures" placeholder="Failures" required>
        <input type="number" name="absences" placeholder="Absences" required>
        <input type="number" name="G1" placeholder="Nilai G1" required>
        <input type="number" name="G2" placeholder="Nilai G2" required>

        <button type="submit">Prediksi</button>
    </form>

    {% if prediction %}
        <div class="hasil">
            Hasil Prediksi: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
